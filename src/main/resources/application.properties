spring.application.name=social-job-platform


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_tuyen_dung}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root_password}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.jpa.show-sql=${SHOW_SQL:true}

firebase.service-account.path=classpath:firebase-service-account.json